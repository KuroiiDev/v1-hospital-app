services:
  - type: web
    name: purth-app
    runtime: php
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      
      # database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: medic-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: medic-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: medic-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: medic-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: medic-db
          property: password

databases:
  - name: medic-db
    plan: free